services:

  # ─── PostgreSQL (chronos, litellm, langfuse)  ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      POSTGRES_DB: chronos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos -d chronos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Langfuse v2 ──────────────────────────────────────────────────────────
  langfuse:
    image: ghcr.io/langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me-in-prod-at-least-32-chars!!}
      SALT: ${LANGFUSE_SALT:-change-me-in-prod-salt-32-chars!!}

      LANGFUSE_INIT_ORG_ID: "chronos-org"
      LANGFUSE_INIT_ORG_NAME: "Chronos"
      LANGFUSE_INIT_PROJECT_ID: "chronos-agent"
      LANGFUSE_INIT_PROJECT_NAME: "Chronos Agent"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-placeholder}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-placeholder}

      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@admin.com}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-admin12345678}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$$HOSTNAME:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ─── Chronos Agent ─────────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      llm-proxy:
        condition: service_healthy
      langfuse:
        condition: service_started
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - audio_files:/app/audio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ─── LLM Proxy (LiteLLM) ──────────────────────────────────────────────────
  llm-proxy:
    build:
      context: ./services/litellm_proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "8001", "--host", "0.0.0.0"]
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./services/litellm_proxy/config.yaml:/app/config.yaml:ro
      - ./services/litellm_proxy/guardrails_hook.py:/app/guardrails_hook.py:ro
    environment:
      LLM_PROXY_API_KEY: "${LLM_PROXY_API_KEY:-dev-key-1}"
      LITELLM_TELEMETRY: "False"

      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-pk-lf-placeholder}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-sk-lf-placeholder}"
      LANGFUSE_HOST: "http://langfuse:3000"

      DATABASE_URL: "${LITELLM_DATABASE_URL:-postgresql://litellm:litellm@postgres:5432/litellm}"
    depends_on:
      postgres:
        condition: service_healthy
      langfuse:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/metrics/', timeout=5).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── cAdvisor — container-level CPU / Memory / Network metrics ──────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    ports:
      - "${CADVISOR_PORT:-8088}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - "--housekeeping_interval=10s"
      - "--max_housekeeping_interval=15s"
      - "--store_container_labels=true"
      - "--disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,cpu_topology,resctrl"

  # ─── Node Exporter — host-level CPU / Memory / Disk metrics ─────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host/root"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  # ─── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      llm-proxy:
        condition: service_started
      cadvisor:
        condition: service_started
      node-exporter:
        condition: service_started

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
    driver: local
  audio_files:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
